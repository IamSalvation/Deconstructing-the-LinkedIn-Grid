<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

   
        .main-container {
            gap: 10px;
            display: grid;
            grid-template-columns: 0.5fr 1fr 0.1fr 2.5fr 0.1fr 1.5fr 0.5fr ;
            grid-template-rows: 0.07fr 0.015fr 0.1fr 0.025fr 0.025fr 0.025fr 0.1fr 0.125fr 0.15fr 0.125fr 0.125fr ;
            background-color: darkgray;
            width: 100%;
            min-height: 1900px;
        }

        .cell1 {
            grid-column: 1 /span 8;
            grid-row: 1;
            background-color: ghostwhite;
        } 

        .cell2 {
            grid-column: 2 ;
            grid-row: 3 / span 4 ;
            background-color: ghostwhite;  
        }

        .cell3 {
            grid-column: 4;
            grid-row: 3;
            background-color: ghostwhite;
            display: grid;
            grid-template-columns: repeat(15, 0.1fr);
            grid-template-rows: 0.075fr 0.4fr 0.45fr;
            gap: 10px; 
            
        }
        .sub {
            border-radius: 20px;
        }

        .one {
            grid-column: 2 / span 2;
            grid-row: 2;
            background-color: darkgrey;
            border-radius: 60%;
        }
        .two {
            grid-column: 3 / span 3;
            grid-row: 3;
            background-color: darkgrey;
        }
        .three {
            grid-column: 7 / span 3;
            grid-row: 3;
            background-color: darkgrey;

        }
        .four {
            grid-column: 11 / span 3;
            grid-row: 3;
            background-color: darkgrey;
        }

        .five {
            grid-column: 4/ span 11;
            grid-row: 2;
            background-color: darkgrey;
            border-radius: 35px;
        }

        .cell4 {
           grid-column: 6;
           grid-row: 3 / span 5;
           background-color: ghostwhite;
        }
        .cell7 {
            grid-column: 4;
            grid-row: 4; 
        }

        .cell8 {
            grid-column: 4;
            grid-row: 5 / span 5;
            background-color: ghostwhite;
        }
        
        .cell9 {
            grid-column: 2;
            grid-row: 7;
            background-color: ghostwhite;
        }

        .cell10 {
            grid-column: 2;
            grid-row: 8;
            background-color: ghostwhite;
        }

        .cell11 {
            grid-column: 2;
            grid-row: 9;
            background-color: ghostwhite;
        }

        .cell12 {
            grid-column: 6;
            grid-row: 8 ;
            background-color: ghostwhite;
        }

        .cell13 {
            grid-column: 6;
            grid-row: 9 / span 2;
            background-color: ghostwhite;
        }


    </style>
</head>
<body>
    <div class="main-container">
        <div class="cell1"></div>
        <div class="cell2 sub"></div>
        <div class="cell3 sub"> 
            <div class="cell one"></div>
            <div class="cell two"></div>
            <div class="cell three"></div>
            <div class="cell four"></div>
            <div class="cell five"></div>
        </div>
        <div class="cell4 sub"></div>
        <div class="cell5 sub "></div>
        <div class="cell6 sub"></div>
        <div class="cell7 sub">_____________________________________________________________________________________Sortby : Top^</div>
        <div class="cell8 sub"></div>
        <div class="cell9 sub"></div>
        <div class="cell10 sub"></div>
        <div class="cell11 sub"></div>
        <div class="cell12 sub"></div>
        <div class="cell13 sub"></div>
        <div class="cell14 sub"></div>
        <div class="cell15"></div>
        <div class="cell16"></div>
        <div class="cell17"></div>
        <div class="cell18"></div>
        <div class="cell19"></div>
        <div class="cell20"></div>
        <div class="cell21"></div>
        <div class="cell22"></div>
        <div class="cell23"></div>
        <div class="cell24"></div>
        <div class="cell25"></div>
        <div class="cell26"></div>
        <div class="cell27"></div>
        <div class="cell28"></div>
        <div class="cell29"></div>
        <div class="cell30"></div>
        <div class="cell31"></div>
        <div class="cell32"></div>
        <div class="cell33"></div>
        <div class="cell34"></div>
        <div class="cell35"></div>
        <div class="cell36"></div>
        <div class="cell37"></div>
        <div class="cell38"></div>
        <div class="cell39"></div>
        <div class="cell40"></div>
        <div class="cell41"></div>
        <div class="cell42"></div>
        <div class="cell43"></div>
        <div class="cell44"></div>
        <div class="cell45"></div>
        <div class="cell46"></div>
        <div class="cell47"></div>
        <div class="cell48"></div>
        <div class="cell49"></div>
        <div class="cell50"></div>
    </div>    
</body>
</html>
